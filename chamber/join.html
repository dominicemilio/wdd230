<!doctype html>
<html lang="en-US">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join the Chamber - Chamber of Commerce</title>
  <meta name="description" content="Join the Chamber of Commerce through our membership application form.">
  <meta name="author" content="Dominic E. Clemence">
  <link rel="stylesheet" href="styles/normalize.css">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/medium.css">
  <link rel="stylesheet" href="styles/larger.css">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>

<body>
  <header>
    <div id="header-container">
      <div class="logo-container">
        <img class="logo" src="images/logo.webp" alt="Logo of the Guatape Chamber of Commerce">
      </div>
      <nav>
        <button id="menu-toggle" aria-label="Toggle Menu">☰</button>
        <ul id="nav-menu">
          <li><a href="index.html">Home</a></li>
          <li><a href="discover.html">Discover</a></li>
          <li><a href="directory.html">Directory</a></li>
          <li><a href="join.html">Join</a></li>
        </ul>
      </nav>
      <div class="dark-mode-toggle">
        <label class="switch">
          <span>Dark Mode</span>
          <input type="checkbox" id="dark-mode-toggle">
          <span class="slider round"></span>
        </label>
      </div>
    </div>
  </header>


  <main id="join-main" class="join-container">
    <h1 id="join-title">Join the Chamber</h1>
    <form id="join-form" class="join-form" method="get" action="thankyou.html">
      <label class="join-label">First Name: <input type="text" name="first-name" id="first-name" required></label>
      <label class="join-label">Last Name: <input type="text" name="last-name" id="last-name" required></label>
      <label class="join-label">Title/Position: <input type="text" name="title" id="title" required
          pattern="[A-Za-z\-\s]{2,}"></label>
      <label class="join-label">Email: <input type="email" name="email" id="email" required
          placeholder="example@domain.com"></label>
      <label class="join-label">Phone: <input type="tel" name="phone" id="phone" required></label>
      <label class="join-label">Business/Organization Name: <input type="text" name="business" id="business"
          required></label>
      <label class="join-label">Membership Level:
        <select name="membership" id="membership" class="join-select">
          <option value="np">Non-Profit (Free)</option>
          <option value="bronze">Bronze</option>
          <option value="silver">Silver</option>
          <option value="gold">Gold</option>
        </select>
      </label>
      <label class="join-label">Business Description:
        <textarea name="description" id="description" class="join-textarea"></textarea>
      </label>
      <input type="hidden" id="timestamp" name="timestamp">
      <button type="submit" id="join-submit" class="join-button">Send Application</button>
    </form>
  </main>

  <footer>
    <div class="footer-container">
      <div class="footer-left">
        <img src="images/logo.svg" alt="Company Logo" class="footer-logo">
        <p><a class="email" href="mailto:info@chamberofcommerce.com">info@chamberofcommerce.com</a></p>
        <p>
          <a href="https://www.google.com/maps/place/Guatape,+Antioquia,+Colombia" target="_blank"
            class="location-link">
            <i class="map-pin-icon">📍</i> Guatape, Antioquia
          </a>
        </p>
      </div>
      <div class="footer-center">
        <p>Developed by <strong>Dominic Emilio Clemence</strong> for WDD 230</p>
        <p>Last Modified: <span id="last-modified"></span></p>
      </div>
      <div class="footer-right">
        <a href="https://www.facebook.com" target="_blank" aria-label="Facebook">
          <img src="images/facebook-icon.png" alt="Facebook" class="social-icon">
        </a>
        <a href="https://www.linkedin.com" target="_blank" aria-label="LinkedIn">
          <img src="images/linkedin-icon.png" alt="LinkedIn" class="social-icon">
        </a>
      </div>
    </div>

  </footer>
  <script src="scripts/scripts.js"></script>

</body>

</html>
