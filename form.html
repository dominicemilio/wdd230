  <link rel="stylesheet" href="styles/medium.css">
  <link rel="stylesheet" href="styles/larger.css">
  <link rel="stylesheet" href="styles/form.css">

</head>

<body>
  <div id="header-container">
    <header>
      <img src="images/dominic-bowtie.webp" alt="Profile picture of a man in bowtie">
      <h1>Dominic E. Clemence</h1>
    </header>
    <a id="menu" href="#" aria-label="Open navigation menu"></a>
    <nav>
      <ul class="navigation">
        <li><a href="index.html">Home</a></li>
        <li><a href="lesson03/chamber-site-plan.html">Site Plan</a></li>
        <li><a href="chamber/">Chamber</a></li>
        <li><a href="https://www.byui.edu" target="_blank">BYU-Idaho</a></li>
        <li>
          <a href="https://www.churchofjesuschrist.org/study/scriptures/nt/mark/9?lang=eng&id=p23#p23"
            target="_blank">Scripture</a>
        </li>
        <li><a href="form.html">Form</a></li>
      </ul>
    </nav>
  </div>

  <main>
    <div id="formmessage"></div>
    <h2>Sign Up</h2>
    <form method="get" action="record.html">
      <label for="username" class="req">Username</label>
      <input type="text" id="username" name="username" required>

      <label for="password" class="req">Password</label>
      <input type="password" id="password" name="password" pattern="[A-Za-z0-9]{8,}" required>

      <label for="confirm-password" class="req">Confirm Password</label>
      <input type="password" id="confirm-password" name="confirm-password" required>

      <label for="email" class="req">Email</label>
      <input type="email" id="email" name="email" pattern="[a-zA-Z0-9_.\-]+@byui\.edu" required>

      <label for="rating">Page Rating</label>
      <div id="rangevalue">5</div>
      <input type="range" id="rating" name="rating" min="1" max="10" step="1" value="5">

      <button type="submit">Submit</button>
    </form>
  </main>

  <footer>
    <p>
      &copy; <span id="year"></span> <span class="line-break">Dominic Emilio Clemence</span>
      <span class="line-break">Colombia</span>
      <img src="images/colombian-flag2.webp" alt="Flag of Colombia">
    </p>
    <p id="lastModified"></p>
  </footer>
  <script src="scripts/form.js"></script>
  <script src="scripts/getdates.js"></script>
  <script src="scripts/hamburger.js"></script>
</body>

</html>
